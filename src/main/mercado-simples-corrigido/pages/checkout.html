<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - MercadoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="../index.html">
        <i class="bi bi-shop"></i> MercadoFácil
      </a>
    </div>
  </nav>

  <div class="container my-5">
    <h1 class="mb-4">Checkout</h1>

    <div class="row">
      <div class="col-lg-8">
        <div class="card mb-4">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Dados de Entrega</h5>
          </div>
          <div class="card-body">
            <form id="checkoutForm">
              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="fullName" class="form-label">Nome Completo</label>
                  <input type="text" class="form-control" id="fullName" required>
                </div>
                <div class="col-md-6">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" required>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="phone" class="form-label">Telefone</label>
                  <input type="tel" class="form-control" id="phone" required>
                </div>
                <div class="col-md-6">
                  <label for="cpf" class="form-label">CPF</label>
                  <input type="text" class="form-control" id="cpf" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="address" class="form-label">Endereço</label>
                <input type="text" class="form-control" id="address" required>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="city" class="form-label">Cidade</label>
                  <input type="text" class="form-control" id="city" required>
                </div>
                <div class="col-md-3">
                  <label for="state" class="form-label">Estado</label>
                  <input type="text" class="form-control" id="state" required>
                </div>
                <div class="col-md-3">
                  <label for="zipcode" class="form-label">CEP</label>
                  <input type="text" class="form-control" id="zipcode" required>
                </div>
              </div>

              <hr>

              <div class="card-header bg-primary text-white mt-4">
                <h5 class="mb-0">Método de Pagamento</h5>
              </div>

              <div class="mt-3">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="paymentMethod" id="creditCard" value="credit_card" checked>
                  <label class="form-check-label" for="creditCard">Cartão de Crédito</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="paymentMethod" id="debit" value="debit">
                  <label class="form-check-label" for="debit">Débito</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="paymentMethod" id="pix" value="pix">
                  <label class="form-check-label" for="pix">PIX</label>
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">
                <i class="bi bi-check-circle"></i> Confirmar Pedido
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card sticky-top" style="top: 80px;">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Resumo do Pedido</h5>
          </div>
          <div class="card-body">
            <div id="orderSummary">
              <p class="text-muted">Carregando...</p>
            </div>
            <hr>
            <div class="d-flex justify-content-between mb-2">
              <span>Subtotal:</span>
              <span id="subtotal">R$ 0,00</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Frete:</span>
              <span id="shipping">R$ 10,00</span>
            </div>
            <hr>
            <div class="d-flex justify-content-between">
              <strong>Total:</strong>
              <strong id="total" class="text-primary" style="font-size: 1.3rem;">R$ 0,00</strong>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="mt-5">
    <div class="container text-center py-4">
      <p>&copy; 2026 MercadoFácil. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    // Função para garantir que os itens sejam lidos do disco, independente do objeto 'cart'
    function getCheckoutItems() {
      const saved = localStorage.getItem('cart');
      return saved ? JSON.parse(saved) : [];
    }

    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      renderCheckoutSummary();
      setupCheckoutForm();
    });

    function renderCheckoutSummary() {
      const summaryContainer = document.getElementById('orderSummary');
      const items = getCheckoutItems();
      
      if (!items || items.length === 0) {
        summaryContainer.innerHTML = '<p class="text-danger">Carrinho vazio. Volte à loja.</p>';
        return;
      }

      let subtotal = 0;
      summaryContainer.innerHTML = items.map(item => {
        const itemPrice = item.price || item.preco || 0;
        const totalLine = itemPrice * item.quantity;
        subtotal += totalLine;
        return `
          <div class="d-flex justify-content-between mb-2">
            <span>${item.name || item.nome} x${item.quantity}</span>
            <span>${formatPrice(totalLine)}</span>
          </div>
        `;
      }).join('');

      const shipping = 10;
      document.getElementById('subtotal').textContent = formatPrice(subtotal);
      document.getElementById('shipping').textContent = formatPrice(shipping);
      document.getElementById('total').textContent = formatPrice(subtotal + shipping);
    }

    function setupCheckoutForm() {
  const user = getCurrentUser();
  if (user) {
    document.getElementById('email').value = user.login || user.email || '';
    document.getElementById('fullName').value = user.name || '';
  }

  document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // 1. Pega os itens do carrinho
    const items = (typeof cart !== 'undefined') ? cart.items : getCheckoutItems();
    
    if (!items || items.length === 0) {
      showToast('Carrinho vazio!', 'error');
      return;
    }

    // 2. Monta o objeto EXATAMENTE como o seu PedidoService.java espera
    // O Java precisa da lista "itens" dentro do objeto Pedido para validar o estoque
    const orderPayload = { 
      status: "PENDENTE", 
      valorTotal: (items.reduce((total, i) => total + (i.price || i.preco || 0) * i.quantity, 0)) + 10,
      itens: items.map(item => ({
        idProduto: item.id,
        quantidade: item.quantity
      }))
    };

    // Bloqueia o botão para evitar cliques duplos
    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processando...';

    try {
      // 3. Envia TUDO em uma única requisição POST
      // O seu Java vai salvar o pedido e os itens automaticamente
      await apiPost('/api/comum/pedidos', orderPayload);

      // 4. Limpa e finaliza
      if (typeof cart !== 'undefined') cart.clear();
      localStorage.removeItem('cart');

      showToast('Pedido realizado com sucesso!');
      setTimeout(() => { window.location.href = '../index.html'; }, 1500);
    } catch (error) { 
      // Se der erro de estoque ou sessão, o apiPost do utils.js vai capturar aqui
      showToast(error.message, 'error'); 
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> Confirmar Pedido';
    }
  });
}
  </script>
</body>
</html>
