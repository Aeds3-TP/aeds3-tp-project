<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Favoritos - MercadoFácil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    :root { --gold-primary: #B8860B; }
    .product-image-container {
        height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f8f9fa;
        border-radius: 12px 12px 0 0;
        overflow: hidden;
    }
    .product-image {
        max-height: 100%;
        max-width: 100%;
        object-fit: contain;
    }
    .price-tag { color: var(--gold-primary); font-weight: bold; font-size: 1.25rem; }
    .btn-gold-outline {
        border: 2px solid var(--gold-primary);
        color: var(--gold-primary);
        transition: 0.3s;
    }
    .btn-gold-outline:hover {
        background-color: var(--gold-primary);
        color: white;
    }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="../index.html">
        <i class="bi bi-arrow-left-circle me-2"></i> Voltar para a Loja
      </a>
    </div>
  </nav>

  <div class="container my-5">
    <div class="d-flex align-items-center mb-4">
        <i class="bi bi-heart-fill fs-2 me-3" style="color: var(--gold-primary);"></i>
        <h2 class="mb-0">Meus Favoritos</h2>
    </div>

    <div id="favoritesGrid" class="row g-4">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="mt-2 text-muted">Sincronizando com o servidor...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>

  <script>
    let favoriteProducts = [];

    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Verifica se o usuário está logado (função do seu utils.js)
      if (typeof requireAuth === "function") requireAuth();
      
      // 2. Carrega os dados
      await loadFavorites();
    });

    async function loadFavorites() {
      const grid = document.getElementById('favoritesGrid');
      try {
        // Busca a lista de favoritos (IDs)
        // O apiGet do seu utils.js DEVE ter o credentials: 'include'
        const favs = await apiGet('/api/comum/favoritos');
        
        if (!favs || favs.length === 0) {
          grid.innerHTML = `
            <div class="col-12 text-center py-5">
              <i class="bi bi-heartbreak text-muted" style="font-size: 5rem;"></i>
              <p class="fs-4 text-muted mt-3">Você ainda não tem favoritos.</p>
              <a href="../index.html" class="btn btn-gold-outline rounded-pill px-4 mt-2">Encontrar Produtos</a>
            </div>`;
          return;
        }

        // Busca todos os produtos para exibir os detalhes (Nome, Preço, Foto)
        const allProducts = await apiGet('/produtos');
        
        // Filtra para mostrar apenas o que o usuário favoritou
        const favIds = favs.map(f => f.idProduto);
        favoriteProducts = allProducts.filter(p => favIds.includes(p.id));

        renderFavorites();
      } catch (error) {
        console.error("Erro na página de favoritos:", error);
        grid.innerHTML = `
          <div class="col-12 text-center py-5 bg-white rounded-4 shadow-sm">
            <i class="bi bi-shield-lock text-danger" style="font-size: 3rem;"></i>
            <h4 class="mt-3">Sessão Expirada ou Erro de Conexão</h4>
            <p class="text-muted">Por favor, faça login novamente para ver seus favoritos.</p>
            <a href="login.html" class="btn btn-primary rounded-pill px-4">Ir para Login</a>
          </div>`;
      }
    }

    function renderFavorites() {
      const grid = document.getElementById('favoritesGrid');
      
      grid.innerHTML = favoriteProducts.map(product => {
        const imageUrl = (product.imagensUrls && product.imagensUrls.length > 0) ? product.imagensUrls[0] : null;

        return `
        <div class="col-sm-6 col-lg-4">
          <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="product-image-container">
              ${imageUrl ? `<img src="${imageUrl}" class="product-image" alt="${product.nome}">` : 
              `<i class="bi bi-image text-muted fs-1"></i>`}
              <button class="btn btn-danger btn-sm position-absolute top-0 end-0 m-3 shadow-sm rounded-circle" 
                      onclick="removeFavorite(${product.id})" title="Remover dos favoritos">
                <i class="bi bi-trash"></i>
              </button>
            </div>
            <div class="card-body">
              <h5 class="card-title text-truncate">${product.nome}</h5>
              <div class="price-tag mb-3">${formatPrice(product.preco)}</div>
              <button class="btn btn-primary w-100 rounded-pill shadow-sm" onclick="addToCartFromFav(${product.id})">
                <i class="bi bi-cart-plus me-2"></i>Adicionar ao Carrinho
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    async function removeFavorite(productId) {
    if (!confirm("Deseja realmente remover este item dos favoritos?")) return;

    try {
        // 1. Chamada para o banco (Passando o ID na URL)
        const response = await apiDelete(`/api/comum/favoritos/${productId}`);
        
        // 2. Verificação de sucesso (Se o back retornar erro, cai no catch)
        if (response && response.erro) {
            showToast(response.erro, 'error');
            return;
        }

        // 3. Atualização Local (O segredo para sumir da tela na hora)
        // Removemos o produto do array 'favoriteProducts' que está na memória
        favoriteProducts = favoriteProducts.filter(p => p.id !== productId);
        
        // 4. Redesenha a lista
        renderFavorites();
        
        showToast('Item removido com sucesso!');

    } catch (error) {
        console.error("Erro ao remover favorito:", error);
        showToast('Não foi possível remover o item. Tente novamente.', 'error');
    }
}

    function addToCartFromFav(productId) {
      const product = favoriteProducts.find(p => p.id === productId);
      if (product && typeof cart !== 'undefined') {
        cart.addItem(product);
        if (typeof showToast === "function") showToast('Produto no carrinho!', 'success');
      }
    }
  </script>
</body>
</html>
